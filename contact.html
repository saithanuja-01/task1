<main>

<section aria-labelledby="contact-form">

<h2 id="contact-form">Get in Touch</h2>

<form action="#" method="post">

<label for="name">Full Name</label>

<input
type="text"
id="name"
name="name"
required
aria-required="true">

<br><br>

<label for="email">Email Address</label>

<input
type="email"
id="email"
name="email"
required
aria-required="true">

<br><br>

<label for="message">Message</label>

<textarea
id="message"
name="message"
rows="5"
required
aria-required="true"></textarea>

<br><br>

<button type="submit">
Send Message
</button>

</form>

</section>

</main>
